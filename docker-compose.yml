version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: aptitudepro_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  postgres:
    image: postgres:15
    container_name: aptitudepro_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aptitudepro
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aptitudepro_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
    container_name: aptitudepro_server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/aptitudepro?authSource=admin
      - POSTGRES_URI=postgres://admin:password@postgres:5432/aptitudepro
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkey_for_dev_only
      - GAMIFICATION_SERVICE_URL=http://gamification:8003
      - PDF_SERVICE_URL=http://pdf:8010
    depends_on:
      - mongodb
      - postgres
      - redis

  # Python Microservices
  adaptive:
    build: ./services/adaptive
    container_name: aptitudepro_adaptive
    ports: ["8001:8001"]

  generator:
    build: ./services/generator
    container_name: aptitudepro_generator
    ports: ["8002:8002"]

  gamification:
    build: ./services/gamification
    container_name: aptitudepro_gamification
    ports: ["8003:8003"]

  voice:
    build: ./services/voice
    container_name: aptitudepro_voice
    ports: ["8004:8004"]

  nlg:
    build: ./services/nlg
    container_name: aptitudepro_nlg
    ports: ["8005:8005"]

  grading:
    build: ./services/grading
    container_name: aptitudepro_grading
    ports: ["8006:8006"]

  recommender:
    build: ./services/recommender
    container_name: aptitudepro_recommender
    ports: ["8007:8007"]

  sync:
    build: ./services/sync
    container_name: aptitudepro_sync
    ports: ["8008:8008"]

  analytics:
    build: ./services/analytics
    container_name: aptitudepro_analytics
    ports: ["8009:8009"]

  pdf:
    build: ./services/pdf
    container_name: aptitudepro_pdf
    ports: ["8010:8010"]

  proctoring:
    build: ./services/proctoring
    container_name: aptitudepro_proctoring
    ports: ["8011:8011"]

  cms:
    build: ./services/cms
    container_name: aptitudepro_cms
    ports: ["8012:8012"]

  backup:
    build: ./services/backup
    container_name: aptitudepro_backup
    ports: ["8013:8013"]

  health_dashboard:
    build: ./services/health_dashboard
    container_name: aptitudepro_health_dashboard
    ports: ["8014:8014"]

volumes:
  mongodb_data:
  postgres_data:
  redis_data:
