name: AptitudePro CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies (Server)
      run: |
        cd server
        npm ci

    - name: Run Server Tests
      run: |
        cd server
        npm test

    - name: Install dependencies (Services)
      run: |
        pip install -r services/requirements.txt
        pip install pytest bandit

    - name: Run Python Security Linting
      run: |
        bandit -r services/

    - name: Run Python Tests
      run: |
        pytest services/

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image (Server)
      run: docker build -t aptitudepro-server ./server

    - name: Build Docker Image (Adaptive Service)
      run: docker build -t aptitudepro-adaptive ./services/adaptive
